name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  quality:
    name: Lint & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Ruff lint
        run: ruff check src tests

      - name: Ruff format
        run: ruff format --check src tests

      - name: Mypy
        run: mypy src

      - name: Run pipeline and build index
        run: |
          lmq pipeline run
          lmq qa build-index

      - name: Pytest
        run: pytest tests -v

  build-and-push:
    name: Build & Push Image
    needs: quality
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - uses: docker/login-action@v3
        with:
          registry: ${{ vars.ACR_LOGIN_SERVER }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Build and push
        run: |
          docker build \
            -t ${{ vars.ACR_LOGIN_SERVER }}/lmq:${{ github.sha }} \
            -t ${{ vars.ACR_LOGIN_SERVER }}/lmq:latest .
          docker push ${{ vars.ACR_LOGIN_SERVER }}/lmq --all-tags

  deploy:
    name: Deploy to Container Apps
    needs: build-and-push
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy new revision
        run: |
          az containerapp update \
            --name lmq-api \
            --resource-group ${{ vars.AZURE_RESOURCE_GROUP }} \
            --image ${{ vars.ACR_LOGIN_SERVER }}/lmq:${{ github.sha }}
