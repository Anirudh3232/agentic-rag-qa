# AWS deployment configuration.
#
# S3 paths use the prefix-based medallion layout inside a single bucket.
# When running as an AWS Glue Python Shell job, the lmq wheel is
# installed as an extra-py-files dependency and paths resolve to S3.

raw_dir: s3://lmq-data-<ACCOUNT_ID>/raw
lake_root: s3://lmq-data-<ACCOUNT_ID>/lake
artifacts_dir: s3://lmq-data-<ACCOUNT_ID>/artifacts

gold_chunk_max_chars: 500

rag:
  index_dir: /tmp/lmq/chroma
  top_k: 3

promotion:
  prod_min_pass_rate: 1.0
  canary_min_pass_rate: 0.75
  max_drifted_columns: 0

gates:
  bronze_min_rows: 1
  silver_min_rows: 1
  gold_min_rows: 1
  min_text_length: 1

# Update these values after running the CloudFormation stack.
# Run: aws cloudformation describe-stacks --stack-name lmq --query 'Stacks[0].Outputs'
cloud:
  s3_bucket: lmq-data-<ACCOUNT_ID>
  aws_region: us-east-1
  secret_name: lmq/openai
  mlflow_tracking_uri: # optional — set to SageMaker MLflow tracking server ARN when provisioned
