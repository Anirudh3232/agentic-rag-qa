# Azure deployment configuration.
#
# Paths reference Databricks Unity Catalog volumes. If using legacy
# workspace mounts, replace /Volumes/... paths with /mnt/lmq/...

raw_dir: /Volumes/lmq_catalog/default/raw
lake_root: /Volumes/lmq_catalog/default/lake
artifacts_dir: /Volumes/lmq_catalog/default/artifacts

gold_chunk_max_chars: 500

rag:
  index_dir: /Volumes/lmq_catalog/default/artifacts/chroma
  top_k: 3

promotion:
  prod_min_pass_rate: 1.0
  canary_min_pass_rate: 0.75
  max_drifted_columns: 0

gates:
  bronze_min_rows: 1
  silver_min_rows: 1
  gold_min_rows: 1
  min_text_length: 1

# Update these values after running `az deployment group create`.
# Bicep appends a uniqueString suffix to each resource name.
# Run `az deployment group show -g lmq-rg -n main --query properties.outputs`
# to retrieve the actual names.
cloud:
  storage_account: lmqlake<SUFFIX>
  keyvault_url: https://lmq-kv-<SUFFIX>.vault.azure.net/
  mlflow_tracking_uri: azureml://eastus.api.azureml.ms/mlflow/v1.0/subscriptions/<SUB_ID>/resourceGroups/lmq-rg/providers/Microsoft.MachineLearningServices/workspaces/lmq-ml
